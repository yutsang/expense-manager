steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/aegis-erp/api:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/aegis-erp/api:latest'
      - '.'
    dir: 'backend'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/aegis-erp/api'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aegis-erp-api'
      - '--image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/aegis-erp/api:${SHORT_SHA}'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60'
      - '--concurrency=80'
      - '--set-env-vars=ENVIRONMENT=production'
      - '--update-secrets=SECRET_KEY=aegis-secret-key:latest,DATABASE_URL=aegis-database-url:latest,REDIS_URL=aegis-redis-url:latest'

substitutions:
  _REGION: asia-southeast1  # Singapore — change to us-central1 / europe-west1 as needed

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/aegis-erp/api:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/aegis-erp/api:latest'

options:
  logging: CLOUD_LOGGING_ONLY
