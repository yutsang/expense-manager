# fly.toml — Aegis ERP API on Fly.io
# Deploy: fly deploy --config fly.toml
# Docs: https://fly.io/docs/reference/configuration/

app = "aegis-erp-api"
primary_region = "syd"  # change to your nearest: syd/sin/hkg/lhr/iad

[build]
  dockerfile = "backend/Dockerfile"
  build_target = "backend"

[env]
  ENVIRONMENT = "production"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval = "15s"
    method = "GET"
    path = "/healthz"
    port = 8000
    timeout = "5s"
    type = "http"

# Secrets to set via: fly secrets set KEY=value
# Required:
#   SECRET_KEY           (min 32 chars random string)
#   DATABASE_URL         (postgresql+asyncpg://... from fly postgres)
#   REDIS_URL            (redis://... from fly redis)
#   ANTHROPIC_API_KEY    (sk-ant-...)
# Optional:
#   SENTRY_DSN
#   OTEL_EXPORTER_OTLP_ENDPOINT
